<html>
    <head>
        <title>Visitor Login</title>
    </head>
    <body>
        <div class="center">
            <h1>Welcome</h1>
            <h2>Visitor Sign in</h2>
            <hr>
            First Name<br>
            <form action="submit.html">
                <input type="text" style="font-size: larger;" id="fname" name="fname" required>
                <br><br>
                Last Name<br>
                <input type="text" style="font-size: larger;" id="lname" name="lname" required><br><br><hr>
                <input type="submit" class="button button1" style="font-size: 30px;">
            </form>
        </div>
    </body>
</html>

<style>
    .center{
        padding-top: 7%;
        font-family: 'Arial';
        text-align: center;
        font-size: xx-large;
    }

    .button{
        border: none;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
    }
    .button1 {background-color: #04AA6D;} /* Green */
</style>
